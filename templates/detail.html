<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ m.name }} · Scrape Movies</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f5f5f5; color: #333; }
.header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; padding: 20px; }
.header a { color: #aaa; text-decoration: none; font-size: 14px; }
.header a:hover { color: #fff; }
.detail { max-width: 900px; margin: 30px auto; padding: 0 20px; display: flex; gap: 30px; flex-wrap: wrap; }
.poster { flex: 0 0 300px; }
.poster img { width: 100%; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.15); }
.info { flex: 1; min-width: 280px; }
.info h1 { font-size: 26px; margin-bottom: 4px; }
.info .sub { color: #888; font-size: 15px; margin-bottom: 16px; }
.info .score-big { font-size: 48px; font-weight: 700; color: #fa0; line-height: 1; }
.info .score-label { font-size: 13px; color: #888; }
.tags { margin: 14px 0; }
.tag { display: inline-block; padding: 4px 14px; border-radius: 20px; background: #e8f0fe; color: #1a73e8; font-size: 13px; margin-right: 6px; margin-bottom: 6px; }
.detail-row { display: flex; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
.detail-row .label { width: 80px; color: #888; flex-shrink: 0; }
.summary { margin-top: 20px; line-height: 1.8; font-size: 15px; color: #555; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.06); }
.summary h3 { font-size: 16px; margin-bottom: 8px; color: #333; }
.back { display: inline-block; margin-top: 20px; padding: 8px 24px; background: #1a73e8; color: #fff; border-radius: 6px; text-decoration: none; font-size: 14px; }
.back:hover { background: #1557b0; }
.footer { text-align: center; padding: 30px; color: #aaa; font-size: 13px; }
</style>
</head>
<body>
<div class="header">
  <a href="/">← 返回列表</a>
</div>

<div class="detail">
  <div class="poster">
    <img src="/images/{{ m.id }}.jpg" alt="{{ m.name }}">
  </div>
  <div class="info">
    <h1>{{ m.name }}</h1>
    <div class="sub">{{ m.region }} · {{ m.duration }}</div>
    <div>
      <span class="score-big">{{ m.score }}</span>
      <span class="score-label"> / 10</span>
    </div>
    <div class="tags">
      {% for c in m.categories %}
      <span class="tag">{{ c }}</span>
      {% endfor %}
    </div>
    <div class="detail-row"><span class="label">上映日期</span><span>{{ m.release or "—" }}</span></div>
    <div class="detail-row"><span class="label">產地</span><span>{{ m.region }}</span></div>
    <div class="detail-row"><span class="label">時長</span><span>{{ m.duration }}</span></div>
    <div class="detail-row"><span class="label">評分</span><span>{{ m.score }}</span></div>

    <div class="summary">
      <h3>劇情簡介</h3>
      <p>{{ m.summary or "暫無簡介" }}</p>
    </div>
  </div>
</div>

<div class="footer">Scrape Center · SSR1</div>
</body>
</html>
